<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSPD Kartvizit Oluşturucu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* === FONT TANIMLAMASI === */
        @font-face {
            font-family: 'Slimshoot';
            src: url('Slimshoot.ttf') format('truetype'); 
            font-weight: normal;
            font-style: normal;
        }

        /* === GENEL ARAYÜZ  === */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 40px 20px 20px 20px; 
            background-color: #0f172a; 
            color: #e2e8f0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            display: flex;
            flex-wrap: wrap; 
            gap: 50px;
            max-width: 1300px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
            flex: 1;
        }

        .custom-footer {
            margin-top: 40px;
            text-align: center;
            color: #94a3b8; 
            font-size: 15px;
            letter-spacing: 0.3px;
            width: 100%;
        }

        .custom-footer .author {
            color: #f8fafc; 
            font-weight: 800; 
        }

        .editor { 
            width: 100%;
            max-width: 380px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            background: #1e293b; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            border: 1px solid #334155;
        }

        .editor h3 { 
            margin: 0 0 10px 0; 
            text-align: center; 
            color: #f8fafc; 
            font-size: 24px;
            letter-spacing: 1px;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea { 
            padding: 14px; 
            font-size: 15px; 
            background-color: #0f172a;
            color: #f8fafc;
            border: 1px solid #334155; 
            border-radius: 8px; 
            outline: none; 
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        textarea {
            resize: vertical;
            line-height: 1.6; 
        }

        input:focus, select:focus, textarea:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        input::placeholder, textarea::placeholder { color: #475569; }
        
        .preview-section { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            align-items: center; 
        }

        button { 
            cursor: pointer; 
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white; 
            border: none; 
            border-radius: 8px; 
            padding: 16px 30px; 
            font-size: 18px; 
            font-weight: bold; 
            letter-spacing: 1px;
            transition: all 0.3s ease; 
            width: 100%; 
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        button:hover { 
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }

        button:active { transform: translateY(0); }
        button:disabled { background: #475569; cursor: not-allowed; transform: none; box-shadow: none; }

        .card-wrapper {
            width: 800px;
            height: 464px; 
            display: block;
        }

        #business-card {
            width: 500px; 
            height: 290px; 
            transform: scale(1.6);
            transform-origin: top left; 
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            position: relative; 
            overflow: hidden; 
            background-color: #ffffff; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            border-radius: 4px; 
            transition: background-image 0.3s ease-in-out, background-color 0.3s ease;
        }

        .template-none {
            background-color: #1e293b !important;
            border: 2px dashed #475569; 
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: none !important; 
        }

        .template-none::after {
            content: 'Lütfen önizleme için bir şablon seçiniz.';
            color: #94a3b8;
            font-size: 25px;
            letter-spacing: 1px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .template-none .smooth-text { display: none; }

        .template-1 { background-image: url('template1.png'); background-color: #f4f6f8; } 
        .template-2 { background-image: url('template2.png'); background-color: #f4f6f8; }
        .template-3 { background-image: url('template3.png'); background-color: #f4f6f8; }
        .template-4 { background-image: url('template4.png'); background-color: #f4f6f8; }
        .template-5 { background-image: url('template5.png'); background-color: #f4f6f8; }
        .template-6 { background-image: url('template6.png'); background-color: #f4f6f8; }

        .smooth-text {
            position: absolute;
            font-family: 'Slimshoot', sans-serif; 
            color: #2d436b; 
            font-size: 23px;
            text-transform: none; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale;  
            text-shadow: 0 0 1px rgba(0,0,0,0.01); 
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
        }

        #preview-phone {
            top: 13px;      
            right: 1px;    
            width: 110px;   
            text-align: left; 
        }

        #preview-by {
            bottom: 45px;   
            left: 55px;    
            width: 375px;   
            text-align: left; 
            white-space: pre-wrap !important; 
            line-height: 1.5; 
        }

        /* Mobil Cihazlar İçin Otomatik Oranlama */
        @media (max-width: 900px) {
            .card-wrapper {
                transform: scale(0.7);
                transform-origin: top center;
                margin-bottom: -90px;
            }
            button { margin-top: 20px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="editor">
            <h3>LSPD KARTVİZİT PORTALI</h3>
            
            <div class="input-group">
                <label>Şablon Seçimi</label>
                <select id="template-selector">
                    <option value="template-none" selected disabled>Lütfen Bir Şablon Seçiniz...</option>
                    <option value="template-1">Patrol Division</option>
                    <option value="template-2">Area Detective Division</option>
                    <option value="template-3">Central Traffic Division</option>
                    <option value="template-4">Metropolitan Division</option>
                    <option value="template-5">Metropolitan Division v2</option>
                </select>
            </div>

            <div class="input-group">
                <label>Telefon Numarası</label>
                <input type="text" id="input-phone" placeholder="Örn: 555-0199">
            </div>

            <div class="input-group">
                <label>Personel Adı</label>
                <textarea id="input-by" rows="2" placeholder="Örn: J. Doe&#10;Alt satıra geçmek için Enter'a basın"></textarea>
            </div>
        </div>

        <div class="preview-section">
            <div class="card-wrapper">
                <div id="business-card" class="template-none">
                    <div id="preview-phone" class="smooth-text"></div>
                    <div id="preview-by" class="smooth-text"></div>
                </div>
            </div>
            <button onclick="downloadCard()" id="download-btn">KARTVİZİT OLUŞTUR</button>
        </div>
    </div> <div class="custom-footer">
        <span class="author">Muptazelle</span> (with 🤖)
    </div>

    <script>
        const inputPhone = document.getElementById('input-phone');
        const inputBy = document.getElementById('input-by');
        const templateSelector = document.getElementById('template-selector');
        const businessCard = document.getElementById('business-card');

        const previewPhone = document.getElementById('preview-phone');
        const previewBy = document.getElementById('preview-by');
        const downloadBtn = document.getElementById('download-btn');

        templateSelector.addEventListener('change', (e) => {
            businessCard.className = e.target.value; 
        });

        inputPhone.addEventListener('input', (e) => previewPhone.textContent = e.target.value);
        inputBy.addEventListener('input', (e) => previewBy.textContent = e.target.value);

        function downloadCard() {
            if (businessCard.classList.contains('template-none')) {
                alert("Lütfen indirme işleminden önce menüden bir şablon seçiniz.");
                return;
            }

            const originalText = downloadBtn.textContent;
            downloadBtn.textContent = "SİSTEM İŞLİYOR...";
            downloadBtn.disabled = true;

            html2canvas(businessCard, { 
                scale: 1,     
                useCORS: true,      
                allowTaint: false,
                backgroundColor: '#ffffff',
                onclone: function (clonedDoc) {
                    const cardClone = clonedDoc.getElementById('business-card');
                    cardClone.style.transform = 'none';
                    cardClone.style.boxShadow = 'none'; 
                    cardClone.style.borderRadius = '0'; 
                }
            }).then(canvas => {
                try {
                    const imgData = canvas.toDataURL("image/png");
                    const link = document.createElement('a');
                    link.href = imgData;
                    link.download = 'lspd_kartvizit.png';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (error) {
                    alert("İndirme başarısız oldu. Hata detayı: " + error.message);
                } finally {
                    downloadBtn.textContent = originalText;
                    downloadBtn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
