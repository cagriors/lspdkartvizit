<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSPD Kartvizit Oluşturucu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            background-color: #0f172a; 
            color: #e2e8f0;
            display: flex; 
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            display: flex;
            flex-wrap: wrap; 
            gap: 50px;
            max-width: 1300px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
        }
        
        .editor { 
            width: 100%;
            max-width: 380px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            background: #1e293b; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            border: 1px solid #334155;
        }

        .editor h3 { 
            margin: 0 0 10px 0; 
            text-align: center; 
            color: #f8fafc; 
            font-size: 24px;
            letter-spacing: 1px;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select { 
            padding: 14px; 
            font-size: 15px; 
            background-color: #0f172a;
            color: #f8fafc;
            border: 1px solid #334155; 
            border-radius: 8px; 
            outline: none; 
            transition: all 0.3s ease;
        }

        input:focus, select:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        input::placeholder { color: #475569; }
        
        .preview-section { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            align-items: center; 
        }

        button { 
            cursor: pointer; 
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white; 
            border: none; 
            border-radius: 8px; 
            padding: 16px 30px; 
            font-size: 18px; 
            font-weight: bold; 
            letter-spacing: 1px;
            transition: all 0.3s ease; 
            width: 100%; 
            max-width: 800px; 
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        button:hover { 
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }

        button:active { transform: translateY(0); }
        button:disabled { background: #475569; cursor: not-allowed; transform: none; box-shadow: none; }
        #business-card {
            width: 800px; 
            height: 440px; 
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            position: relative; 
            overflow: hidden; 
            background-color: #ffffff; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            border-radius: 10px; 
            transition: background-image 0.3s ease-in-out, background-color 0.3s ease;
        }

        .template-none {
            background-color: #1e293b !important;
            border: 2px dashed #475569;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: none !important;
        }

        .template-none::after {
            content: 'Lütfen önizleme için sol menüden bir şablon seçiniz.';
            color: #94a3b8;
            font-size: 20px;
            letter-spacing: 1px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .template-none #preview-identity,
        .template-none #preview-contact {
            display: none;
        }

        /* Mevcut Şablonlar */
        .template-1 { background-image: url('template1.png'); background-color: #e2e8f0; } 
        .template-2 { background-image: url('template2.png'); background-color: #e2e8f0; }
        .template-3 { background-image: url('template3.png'); background-color: #e2e8f0; }

        .smooth-text {
            font-family: 'Times New Roman', Times, serif;
            color: #1a1a1a; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale;  
            text-shadow: 0 0 1px rgba(0,0,0,0.01); 
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            line-height: 1.2;
        }

        #preview-identity {
            position: absolute;
            top: 185px; 
            left: 50%;
            transform: translateX(-50%); 
            width: 350px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #preview-name { font-size: 30px; font-weight: normal; }
        #preview-title { font-size: 24px; font-weight: normal; margin-top: 2px; }

        #preview-contact {
            position: absolute;
            bottom: 60px; 
            left: 550px; 
            width: 240px; 
            display: flex;
            flex-direction: column;
            gap: 3px; 
            text-align: left; 
        }

        #preview-cell, #preview-email { font-size: 22px; font-weight: normal; }

        @media (max-width: 900px) {
            #business-card {
                transform: scale(0.45);
                transform-origin: top center;
                margin-bottom: -240px; 
            }
            button { margin-top: 20px; }
        }

    </style>
</head>
<body>

    <div class="app-container">
        <div class="editor">
            <h3>KARTVİZİT ŞABLONLARI</h3>
            
            <div class="input-group">
                <label>Şablon Seçimi</label>
                <select id="template-selector">
                    <option value="template-none" selected disabled>Lütfen Bir Şablon Seçiniz...</option>
                    <option value="template-1">K9 Platoon</option>
                    <option value="template-2">C Platoon</option>
                    <option value="template-3">D Platoon</option>
                </select>
            </div>

            <div class="input-group">
                <label>Personel Adı Soyadı</label>
                <input type="text" id="input-name" placeholder="Örn: John Doe">
            </div>

            <div class="input-group">
                <label>Görevlendirme (Unvan)</label>
                <input type="text" id="input-title" placeholder="Örn: Element Member">
            </div>

            <div class="input-group">
                <label>İletişim Numarası</label>
                <input type="text" id="input-cell" placeholder="Örn: (123) 456-7890">
            </div>

            <div class="input-group">
                <label>E-posta Adresi</label>
                <input type="text" id="input-email" placeholder="Örn: isim@lspdonline.org">
            </div>
        </div>

        <div class="preview-section">
            <div id="business-card" class="template-none">
                <div id="preview-identity">
                    <div id="preview-name" class="smooth-text"></div>
                    <div id="preview-title" class="smooth-text"></div>
                </div>
                <div id="preview-contact">
                    <div id="preview-cell" class="smooth-text"></div>
                    <div id="preview-email" class="smooth-text"></div>
                </div>
            </div>
            <button onclick="downloadCard()" id="download-btn">KARTVİZİTİ OLUŞTUR VE İNDİR</button>
        </div>
    </div>

    <script>
        const inputName = document.getElementById('input-name');
        const inputTitle = document.getElementById('input-title');
        const inputCell = document.getElementById('input-cell');
        const inputEmail = document.getElementById('input-email');
        const templateSelector = document.getElementById('template-selector');
        const businessCard = document.getElementById('business-card');

        const previewName = document.getElementById('preview-name');
        const previewTitle = document.getElementById('preview-title');
        const previewCell = document.getElementById('preview-cell');
        const previewEmail = document.getElementById('preview-email');
        const downloadBtn = document.getElementById('download-btn');

        templateSelector.addEventListener('change', (e) => {
            businessCard.className = e.target.value; 
        });

        inputName.addEventListener('input', (e) => previewName.textContent = e.target.value);
        inputTitle.addEventListener('input', (e) => previewTitle.textContent = e.target.value);
        
        inputCell.addEventListener('input', (e) => {
            if(e.target.value.trim() !== '') {
                previewCell.textContent = 'Cell: ' + e.target.value;
            } else {
                previewCell.textContent = '';
            }
        });
        
        inputEmail.addEventListener('input', (e) => previewEmail.textContent = e.target.value);

        function downloadCard() {
            // Şablon seçilmemişse indirmeyi engelle
            if (businessCard.classList.contains('template-none')) {
                alert("Lütfen indirme işleminden önce menüden bir kartvizit şablonu seçiniz.");
                return;
            }

            const originalText = downloadBtn.textContent;
            downloadBtn.textContent = "SİSTEM İŞLİYOR...";
            downloadBtn.disabled = true;

            html2canvas(businessCard, { 
                scale: 3,           
                useCORS: true,      
                allowTaint: true,   
                backgroundColor: '#ffffff'
            }).then(canvas => {
                try {
                    const imgData = canvas.toDataURL("image/png");
                    const link = document.createElement('a');
                    link.href = imgData;
                    link.download = 'lspd_kartvizit.png';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (error) {
                    alert("İndirme başarısız oldu. Hata detayı: " + error.message);
                } finally {
                    downloadBtn.textContent = originalText;
                    downloadBtn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
